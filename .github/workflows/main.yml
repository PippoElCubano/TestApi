name: Test Ryanair
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Ryanair API
        run: |
          python3 -c "
          import urllib.request
          url = 'https://www.ryanair.com/api/booking/v4/it-it/availability?ADT=1&TEEN=0&CHD=0&INF=0&Origin=CAG&Destination=BGY&promoCode=&IncludeConnectingFlights=false&DateOut=2026-06-24&DateIn=&FlexDaysBeforeOut=2&FlexDaysOut=2&FlexDaysBeforeIn=2&FlexDaysIn=2&RoundTrip=false&IncludePrimeFares=false&ToUs=AGREED'
          req = urllib.request.Request(url, headers={'accept':'application/json','client':'desktop','client-version':'3.193.1','traceparent':'00-aabbccddeeff00112233445566778899-aabbccdd11223344-00'})
          try:
            r = urllib.request.urlopen(req)
            print('STATUS:', r.getcode())
          except urllib.error.HTTPError as e:
            print('STATUS:', e.code)
          "
